<!DOCTYPE html>
<!-- Dichiara il tipo di documento HTML5 -->
<html lang="it">
<!-- Inizio del documento HTML, con attributo lingua italiana -->

<head>
    <!-- Sezione metadati e risorse della pagina -->
    <meta charset="UTF-8">
    <!-- Specifica la codifica dei caratteri usata (UTF-8) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Imposta il viewport per dispositivi mobili per un design responsive -->
    <title>Menu Pizzeria La Crosta d'Oro</title>
    <!-- Titolo della pagina che appare nella scheda del browser -->
    <link rel="icon" href="img/pizza.png" type="image/png">
    <link rel="stylesheet" href="style.css">
    <!-- Collegamento al file CSS esterno per gli stili -->
</head>

<body>
    <!-- Corpo principale della pagina visibile all'utente -->

    <header>
        <!-- Intestazione della pagina, contiene titolo e sottotitolo -->
        <h1>LA CROSTA D'ORO</h1>
        <!-- Titolo principale del sito o pagina -->
        <p>Scopri il nostro menu artigianale</p>
        <!-- Paragrafo introduttivo o slogan -->
    </header>

    <nav class="menu-nav">
        <!-- Barra di navigazione con link alle sezioni interne della pagina -->
        <a href="#pizze">🍕 Pizze</a>
        <!-- Link che porta alla sezione pizze -->
        <a href="#dolci">🍰 Dolci</a>
        <!-- Link che porta alla sezione dolci -->
        <a href="#bevande">🥤 Bevande</a>
        <!-- Link che porta alla sezione bevande -->
    </nav>

    <main class="menu">
        <!-- Contenuto principale della pagina: il menu diviso in sezioni -->
        <div id="pizze" class="menu-section-title">
            <!-- Contenitore per il titolo della sezione Pizze -->
            <h2>🍕 Le Nostre Pizze</h2>
            <!-- Titolo della sezione -->
        </div>

        <div id="dolci" class="menu-section-title">
            <!-- Titolo della sezione Dolci -->
            <h2>🍰 I Nostri Dolci</h2>
        </div>

        <div id="bevande" class="menu-section-title">
            <!-- Titolo della sezione Bevande -->
            <h2>🥤 Le Bevande</h2>
        </div>

    </main>

    <footer>
        <!-- Sezione footer con informazioni di chiusura -->
        <p>I.T.T.S. Ercolino Scalfaro-Classe VE-A.S. 2025/26</p>
        <!-- Informazioni sull'anno scolastico -->
        <p>Gruppo: Muccari Luigi(Project Manager), Mastria Antonio, Di Marino Davide, Cristofaro Giacomo</p>
        <!-- Elenco membri del gruppo -->
    </footer>
</body>

</html>
